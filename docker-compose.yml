# Dév local : API + Redis (rate limiter partagé). Le frontend tourne à part (pnpm dev).
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Pointe le rate limiter vers le service redis du réseau compose (override
      # de la valeur localhost du .env).
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
